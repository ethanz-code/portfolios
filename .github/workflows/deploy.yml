name: Build and Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

env:
  IMAGE_TAG: portfolios:${{ github.sha }}
  IMAGE_ARCHIVE: portfolios-${{ github.sha }}.tar.gz
  REMOTE_IMAGE_ARCHIVE: /tmp/portfolios-${{ github.sha }}.tar.gz
  CONTAINER_NAME: ${{ vars.DEPLOY_CONTAINER_NAME || 'portfolios' }}
  PORT_MAPPING: ${{ vars.DEPLOY_PORT_MAPPING || '10020:80' }}

jobs:
  deploy:
    name: Build and deploy image
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build image archive
        run: |
          DEPLOYED_AT="$(date -u +'%Y-%m-%dT%H:%M:%SZ')"

          DOCKER_BUILDKIT=1 docker build \
            --platform linux/amd64 \
            --pull \
            --build-arg DEPLOYED_AT="$DEPLOYED_AT" \
            --label org.opencontainers.image.created="$DEPLOYED_AT" \
            -t "$IMAGE_TAG" \
            .

          docker save "$IMAGE_TAG" | gzip -1 > "$IMAGE_ARCHIVE"
          ls -lh "$IMAGE_ARCHIVE"

      - name: Install SSH key
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p "${{ secrets.SSH_PORT || '22' }}" "${{ secrets.SSH_HOST }}" >> ~/.ssh/known_hosts

      - name: Upload image archive
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_PORT: ${{ secrets.SSH_PORT || '22' }}
        run: |
          scp \
            -i ~/.ssh/deploy_key \
            -P "$SSH_PORT" \
            -o StrictHostKeyChecking=yes \
            -o ServerAliveInterval=30 \
            -o ServerAliveCountMax=20 \
            "$IMAGE_ARCHIVE" \
            "$SSH_USER@$SSH_HOST:$REMOTE_IMAGE_ARCHIVE"

      - name: Load image and restart container
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_PORT: ${{ secrets.SSH_PORT || '22' }}
          IMAGE_TAG: ${{ env.IMAGE_TAG }}
          CONTAINER_NAME: ${{ env.CONTAINER_NAME }}
          PORT_MAPPING: ${{ env.PORT_MAPPING }}
          REMOTE_IMAGE_ARCHIVE: ${{ env.REMOTE_IMAGE_ARCHIVE }}
        run: |
          encode() {
            printf '%s' "$1" | base64 -w 0
          }

          IMAGE_TAG_B64="$(encode "$IMAGE_TAG")"
          CONTAINER_NAME_B64="$(encode "$CONTAINER_NAME")"
          PORT_MAPPING_B64="$(encode "$PORT_MAPPING")"
          REMOTE_IMAGE_ARCHIVE_B64="$(encode "$REMOTE_IMAGE_ARCHIVE")"

          ssh \
            -i ~/.ssh/deploy_key \
            -p "$SSH_PORT" \
            -o StrictHostKeyChecking=yes \
            -o ServerAliveInterval=30 \
            -o ServerAliveCountMax=20 \
            "$SSH_USER@$SSH_HOST" \
            IMAGE_TAG_B64="$IMAGE_TAG_B64" \
            CONTAINER_NAME_B64="$CONTAINER_NAME_B64" \
            PORT_MAPPING_B64="$PORT_MAPPING_B64" \
            REMOTE_IMAGE_ARCHIVE_B64="$REMOTE_IMAGE_ARCHIVE_B64" \
            'sh -s' <<'EOF'
          set -eu

          IMAGE_TAG="$(printf '%s' "$IMAGE_TAG_B64" | base64 -d)"
          CONTAINER_NAME="$(printf '%s' "$CONTAINER_NAME_B64" | base64 -d)"
          PORT_MAPPING="$(printf '%s' "$PORT_MAPPING_B64" | base64 -d)"
          IMAGE_ARCHIVE="$(printf '%s' "$REMOTE_IMAGE_ARCHIVE_B64" | base64 -d)"

          trap 'rm -f "$IMAGE_ARCHIVE"' EXIT

          docker load -i "$IMAGE_ARCHIVE"
          docker image inspect "$IMAGE_TAG" >/dev/null

          docker rm -f "$CONTAINER_NAME" 2>/dev/null || true
          docker run -d \
            --name "$CONTAINER_NAME" \
            --restart unless-stopped \
            -p "$PORT_MAPPING" \
            "$IMAGE_TAG"

          docker image prune -f
          EOF
