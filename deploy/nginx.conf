server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  location / {
    try_files $uri $uri/ /404.html;
  }

  location ~* \.(?:css|js|mjs|json|xml|txt|svg|ico|webp|png|jpg|jpeg|gif|woff2?)$ {
    expires 30d;
    add_header Cache-Control "public, max-age=2592000, immutable";
    try_files $uri =404;
  }
}
